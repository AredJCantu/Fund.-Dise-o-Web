<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            margin: 0;
            padding: 0;
        }
        #cuadro{
            margin: 0;
            padding: 0;
            background-color: green;
            text-align: center;
            align-content: center;
            width: 150px;
            color: white;
            font-size: 2em;
            height: 150px;
            position: absolute;
            animation: entrada 5s alternate infinite;
        }
        #cuadro2{
            margin: 0;
            margin-top: 200px;
            padding: 0;
            background-color: blue;
            text-align: center;
            align-content: center;
            width: 150px;
            color: white;
            font-size: 2em;
            height: 150px;
            position: absolute;
            animation: voltear 5s alternate infinite;
            animation-play-state: paused;
        }
        h1{
            display: inline-block;
            font-size: 3em;
            
        }
        #cuadro2:hover{
            animation-play-state: running;
            
        }
        @keyframes voltear {
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(5turn);
                border-radius: 50%;
            }
        }
        @keyframes entrada{
            from{left: 0; bottom:  calc(100% - 150px);;}
            to{left: calc(100% - 150px); bottom:  0}
        }
    </style>
</head>
<body>
    <div id="cuadro">
        Hola
    </div>
    <div id="cuadro2">
        Hola
    </div>
    <h1>saludos a todos</h1>
</body>
</html>
