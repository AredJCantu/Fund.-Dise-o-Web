<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Pipely</title>
    <link href="css/Ejercicio3.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <a href="home.html" class="logo">Pipely</a>
        <nav>
            <a href="home.html">Principal</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="servicios.html">Servicios</a>
        </nav>
        <a href="contacto.html" class="btn-highlight">Contáctanos</a>
    </header>

    <main>
        <section class="contact-section">

            <h1>Contáctanos hoy</h1>


            <form>
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre completo">

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="Tu correo electrónico">

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" placeholder="Texto de ejemplo"></textarea>

                <button type="submit">ENVIAR</button>
            </form>

            <aside>
                <dl>
                    <dt>Correo:</dt>
                    <dd>Consulting@gmail.com</dd>

                    <dt>Teléfono:</dt>
                    <dd>+1 (123) 456-7890</dd>

                    <dt>Oficina:</dt>
                    <dd>456 Business Ave, New York, NY 10001</dd>
                </dl>

                <nav class="socials">
                    <p>Síguenos:</p>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                </nav>
            </aside>
        </section>
    </main>

</body>
</html>
