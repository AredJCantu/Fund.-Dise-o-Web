<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | EduSmart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="login.css" rel="stylesheet" />
</head>
<body>

    <main class="login-card">
        <header class="login-header">
            <h1>EduSmart</h1>
            <p>Plataforma académica</p>
        </header>

        <form action="main.html" method="post">
            <label class="campo">
                <i class="fas fa-envelope"></i> Correo electrónico
                <span class="input-contenedor">
                    <i class="fas fa-user icono-input"></i>
                    <input type="email" name="email" placeholder="estudiante@ejemplo.com">
                </span>
            </label>

            <label class="campo">
                <i class="fas fa-lock"></i> Contraseña
                <span class="input-contenedor">
                    <i class="fas fa-key icono-input"></i>
                    <input type="password" name="password" placeholder="••••••••" >
                </span>
            </label>

            <div class="opciones">
                <label class="recordar">
                    <input type="checkbox" name="remember" checked> Recordarme
                </label>
                <a href="#" class="olvido">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit">
                <i class="fas fa-arrow-right-to-bracket"></i> Iniciar sesión
            </button>
        </form>

        <footer class="login-footer">
            <p><i class="fas fa-graduation-cap"></i> Acceso seguro · Entorno educativo</p>
        </footer>
    </main>

</body>
</html>
